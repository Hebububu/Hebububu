name: Metrics
on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      # Column 1: Profile info
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: Hebububu
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: Asia/Seoul
          plugin_lines: yes
          plugin_lines_history_limit: 1
          plugin_lines_repositories_limit: 4
          plugin_lines_sections: base
          filename: isocalendar.svg

      # Column 2: Calendar + Issues/PRs status + Languages + Notable contributions
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: Hebububu
          template: classic
          base: ""
          config_timezone: Asia/Seoul
          config_order: isocalendar, followup, languages, notable
          repositories_affiliations: owner, organization_member

          # Contribution calendar
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year

          # Follow-up issues & PRs
          plugin_followup: yes
          plugin_followup_sections: repositories
          plugin_followup_indepth: yes

          # Languages
          plugin_languages: yes
          plugin_languages_analysis_timeout: 15
          plugin_languages_categories: markup, programming
          plugin_languages_colors: github
          plugin_languages_limit: 8
          plugin_languages_recent_categories: markup, programming
          plugin_languages_recent_days: 14
          plugin_languages_recent_load: 300
          plugin_languages_sections: most-used
          plugin_languages_threshold: 0%
          plugin_languages_ignored: Java
          plugin_languages_indepth: yes

          # Notable contributions (exclude org repos)
          plugin_notable: yes
          plugin_notable_from: user
          plugin_notable_types: commit
          plugin_notable_indepth: yes
          plugin_notable_repositories: yes
          plugin_notable_filter: stars:>0
          plugin_notable_self: no

          filename: github-metrics.svg
